<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<meta name="theme-color" content="#0b0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Entreno">
<title>Garmin Entreno</title>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#0b0c0f;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{background:#0b0c0f;color:#eaeaea;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;min-height:100dvh;overscroll-behavior:none}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100dvh}
.sidebar{display:flex;flex-direction:column}
#output{flex:1;background:#0b0c0f}

/* ── HEADER/EDITOR ── */
.editor{background:#0f1014;border-bottom:1px solid #1e1f25;padding:12px 14px}
.editor-top{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.editor-title{font-size:11px;font-weight:700;color:#9aa0a6;letter-spacing:1px;text-transform:uppercase}
.editor-actions{display:flex;gap:8px;flex-shrink:0}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1px solid transparent;border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:600;line-height:1;
  min-height:40px;padding:0 14px;
  transition:opacity .15s,transform .1s;
  -webkit-appearance:none;touch-action:manipulation;user-select:none;white-space:nowrap}
.btn:active{opacity:.65;transform:scale(.97)}
@media(min-width:640px){.btn{min-height:36px;font-size:12px}}
.btn-render{background:linear-gradient(135deg,#1e4d1e,#2a6a2a);border-color:#3a8a3a;color:#7eff7e;box-shadow:0 1px 8px rgba(74,222,128,.15)}
.btn-img  {background:#141826;border-color:#2a3450;color:#7aafff;font-size:clamp(10px,2.5vw,12px)}
.btn-copy-img{background:#141826;border-color:#2a3450;color:#a78bfa;font-size:clamp(10px,2.5vw,12px)}
.btn-fit  {background:#0d1a14;border-color:#1a3a28;color:#4ade80;font-size:clamp(10px,2.5vw,12px)}
.btn-clear{background:#180f0f;border-color:#3a1a1a;color:#e74c3c}
.btn-copy {background:#1a1b20;border-color:#2a2b32;color:#9aa0a6}

/* ── ACTION ROWS ── */
.action-row-main{display:flex;flex-wrap:wrap;gap:6px;width:100%}
.btn-render{flex:1 1 60%;min-width:120px}
.btn-img,.btn-copy-img{flex:1 1 40%;min-width:100px}
.btn-clear{flex:0 0 44px;width:44px}
.action-row-filter{display:none;margin-top:8px;gap:6px;align-items:center}
.action-row-filter.visible{display:flex}
.filter-input{
  flex:1;min-width:0;height:40px;
  background:#06070a;border:1px solid #1e1f25;border-radius:7px;
  color:#b8c8e0;font-size:16px;padding:0 10px;outline:none;
  -webkit-appearance:none;transition:border-color .2s}
.filter-input:focus{border-color:#3a5a8a}
.btn-filter-ok{display:inline-flex;align-items:center;justify-content:center;
  background:#141826;border:1px solid #2a3450;color:#7aafff;
  border-radius:7px;height:36px;padding:0 12px;font-size:11px;font-weight:600;
  cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0}
.btn-filter-ok:hover{background:#1a2035}
.btn-filter-ok.green{border-color:#1e3a1e;color:#7eff7e}
.btn-filter-ok.green:hover{background:#0e200e}

/* ── TEXTAREA ── */
.json-wrap{position:relative}
.json-area{
  display:block;width:100%;
  background:#06070a;border:1px solid #1e1f25;border-radius:10px;
  color:#b8c8e0;font-family:'Courier New',Courier,monospace;
  font-size:16px;line-height:1.65;/* 16px prevents iOS zoom on focus */
  padding:12px 14px;resize:vertical;outline:none;
  -webkit-appearance:none;appearance:none;
  height:140px;
  transition:border-color .2s}
.json-area:focus{border-color:#3a6a3a;box-shadow:0 0 0 2px rgba(74,222,128,.08)}
.json-area::placeholder{color:#2a3040}
.hint{font-size:10px;color:#333;margin-top:6px;line-height:1.6}
.error-msg{color:#e74c3c;font-size:11px;margin-top:8px;line-height:1.5;display:none;
  background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.2);
  border-radius:6px;padding:8px 10px}

/* ── OUTPUT ── */
#output{background:#0b0c0f}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px;gap:8px;min-height:200px}
.placeholder-icon{font-size:32px;opacity:.15}
.placeholder-title{font-size:14px;font-weight:500;color:#2a2a2a}
.placeholder-sub{font-size:11px;color:#1e1e1e}

/* ── ACTIVIDAD CARD ── */
.actividad{padding:clamp(14px,3vw,22px) clamp(12px,4vw,24px) clamp(18px,4vw,28px);border-bottom:1px solid #141518}
.actividad:last-child{border-bottom:none}
/* estructura-badge now defined in table section above */
.lbl{font-size:10px;font-weight:700;color:#8a9aa6;letter-spacing:.6px;text-transform:uppercase;margin-bottom:14px;line-height:1.4;
  outline:none;cursor:text;padding:2px 0;border-bottom:1px solid transparent;transition:border-color .15s;display:block}
.lbl:hover{border-bottom-color:#2a3450}
.lbl:focus{border-bottom-color:#4a70b0;color:#b8c8e0}

/* ── TABLE ── */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px}
.table-scroll::-webkit-scrollbar{height:3px}
.table-scroll::-webkit-scrollbar-track{background:transparent}
.table-scroll::-webkit-scrollbar-thumb{background:#1e1f25;border-radius:3px}

table{width:100%;min-width:680px;border-collapse:collapse;font-size:12px;color:#eaeaea;table-layout:auto}
@media(min-width:768px){table{font-size:12px}}

th{text-align:right;color:#6a7280;font-weight:500;
  padding:4px 16px 10px 16px;font-size:10px;
  border-bottom:1px solid #1e1f25;line-height:1.3;white-space:nowrap}
th:first-child{text-align:left;padding-left:2px;padding-right:0;min-width:140px}
th:nth-child(2){min-width:48px}  /* km/h */
th:nth-child(3){min-width:90px}  /* Distancia */
th:nth-child(4){min-width:72px}  /* Cadencia */
th:nth-child(5){min-width:56px}  /* Ritmo */
th:nth-child(6){min-width:56px}  /* FC med */
th:nth-child(7){min-width:56px}  /* FC máx */
th.th-zona{padding-left:40px;text-align:right;min-width:130px;white-space:nowrap}
th.th-dist{text-align:right}
td:first-child{text-align:left;padding-left:2px;padding-right:8px}
.th-sub{display:block;font-size:8.5px;color:#404550;font-weight:400;margin-top:1px;text-align:right}
.th-sub-inline{font-size:8.5px;color:#404550;font-weight:400}

td{padding:15px 16px 15px 16px;border-bottom:.5px solid #111318;
  vertical-align:middle;text-align:right;color:#eaeaea;background:transparent}
td.td-zona{padding-left:40px;padding-right:4px;min-width:130px;text-align:right}

/* ── ESTRUCTURA ── */
.estructura-badge{
  display:inline-flex;align-items:center;
  font-size:10px;color:#555;font-family:'Courier New',monospace;
  background:#0f1014;border:1px solid #1e1f25;border-radius:5px;
  padding:3px 10px;margin-bottom:10px;line-height:1.5;
  max-width:100%;overflow:hidden}
.estructura-text{color:#555;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.metric{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1;gap:0}
.main{font-size:12px;font-weight:600;color:#eaeaea;line-height:1}
.sub{font-size:8.5px;margin-top:3px;line-height:1}
.elev{font-size:8.5px;margin-top:3px;line-height:1}
.dp{color:#e74c3c}.dn{color:#2ecc71}.dz{color:#404550}
.dg{color:#9aa0ae}

/* ── PILLS ── */
.fc-max-pill,.fc-med-pill,.fc-gen-pill{
  display:inline-flex;justify-content:center;align-items:center;
  font-weight:700;font-size:11px;padding:3px 9px;border-radius:20px;min-width:38px;letter-spacing:.3px}
.fc-max-pill{background:#C0392B;color:#fff;box-shadow:0 1px 4px rgba(192,57,43,.35)}
.fc-med-pill{background:#D4680A;color:#fff;box-shadow:0 1px 4px rgba(212,104,10,.3)}
.fc-gen-pill{background:#252830;color:#9aa0ae}

/* ── ROW TYPES ── */
tr.avg-row td{background:rgba(255,255,255,.03);font-weight:500;color:#eaeaea}
tr.avg-act td{background:rgba(232,130,12,.10);font-weight:600;color:#eaeaea}
html body table tbody tr.desc-row td{}
tr.warmup-row td,tr.cooldown-row td{background:rgba(255,255,255,.015);color:#eaeaea}
tr.warmup-row td:first-child,tr.cooldown-row td:first-child{color:#454a55;font-size:11px;font-weight:400;font-style:italic}

/* ── INTERVAL GROUPS (estilo Garmin Connect) ── */
tr.group-header{cursor:pointer}
tr.group-header:hover td{background:rgba(40,90,140,.32)}
tr.group-header td{
  background:rgba(40,90,140,.22);
  border-bottom:.5px solid rgba(60,120,180,.2);
  border-top:.5px solid rgba(60,120,180,.15);
  color:#eaeaea;font-weight:700;font-size:12px}
tr.group-header td:first-child{
  padding-left:4px}
tr.phase-header{cursor:pointer}
tr.phase-header:hover td{background:rgba(255,255,255,.04)}
.group-num{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;border-radius:5px;padding:0 4px;
  background:rgba(80,140,220,.35);color:#90c8ff;
  font-size:9px;font-weight:700;margin-right:7px;flex-shrink:0;letter-spacing:.5px}
.group-label{
  font-size:10px;color:#90c8ff;font-weight:600;margin-right:6px}
.group-dur{
  font-size:11px;color:#eaeaea;font-weight:700}
.group-arrow{
  display:inline-block;font-size:8px;margin-right:5px;
  color:rgba(90,150,220,.7);cursor:pointer;
  transition:transform .2s;vertical-align:middle}
.group-arrow.collapsed{transform:rotate(-90deg)}
tr.group-lap td{
  background:rgba(255,255,255,.015);
  color:#9aa0a6;font-size:11px}
tr.group-lap td:first-child{
  padding-left:28px;color:#6a7280}
tr.group-lap.row-hidden{display:none}
tr.phase-header td{
  background:rgba(255,255,255,.025);
  color:#7a8a9e;font-weight:600;font-size:11px;
  border-bottom:.5px solid #1a1b22;border-top:.5px solid #1a1b22}
tr.phase-header td:first-child{padding-left:4px}
.hide-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:4px;
  background:transparent;border:1px solid transparent;
  color:#2a3040;font-size:9px;cursor:pointer;
  transition:background .12s,color .12s,border-color .12s;
  vertical-align:middle;margin-left:4px;flex-shrink:0;
  user-select:none;line-height:1}
.hide-btn:hover{background:#1e1f25;border-color:#2a3040;color:#e74c3c}
td:first-child:hover .hide-btn{color:#454a55}
.lap-label-cell{display:flex;align-items:baseline;gap:0;flex-direction:column}
.lap-label-row{display:flex;align-items:center;gap:2px}

/* hide buttons during image capture */
.capturing .hide-btn{display:none!important}
.capturing .lbl{border-bottom-color:transparent!important;cursor:default}

/* ── FILTER (handled in action-row styles above) ── */
.btn-filter{background:#141826;border:1px solid #2a3450;color:#6a8ab6;
  border-radius:9px;height:36px;padding:0 12px;font-size:12px;font-weight:600;
  cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-filter:hover{background:#1a2035;color:#7aafff}

/* ── SESSION STATS ── */
.session-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat-chip{display:inline-flex;align-items:center;gap:6px;
  background:#0f1014;border:1px solid #1e1f25;border-radius:7px;
  padding:4px 10px;line-height:1}
.stat-lbl{font-size:9px;color:#454a55;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:11px;color:#b8c8e0;font-weight:700}
.zones{margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid #141518}
.zone-row{margin-bottom:10px}
.zone-lbl{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;color:#8a9aa6;margin-bottom:5px}
.zone-name-wrap{display:flex;align-items:center;gap:8px}
.zone-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zone-name{font-weight:600;color:#eaeaea;font-size:10px}
.zone-range{font-size:8.5px;color:#454a55;margin-left:2px}
.zone-stat{display:flex;align-items:baseline;gap:5px}
.zone-time-main{font-weight:700;color:#eaeaea;font-size:11px}
.zone-pct-sub{color:#454a55;font-size:9.5px}
.bar{height:6px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden}
.bi{height:100%;border-radius:10px;transition:width .4s ease}

/* ── PROMPT SECTION ── */
.prompt-section{background:#080a0c;border-top:1px solid #141518;padding:clamp(12px,3vw,20px) clamp(12px,4vw,24px);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.prompt-toggle{
  display:inline-flex;align-items:center;gap:7px;cursor:pointer;
  font-size:12px;color:#8a9aa6;font-weight:600;
  user-select:none;
  background:#141826;border:1px solid #2a3450;border-radius:9px;
  padding:0 14px;min-height:38px;
  transition:background .15s,color .15s,border-color .15s;
  -webkit-appearance:none;touch-action:manipulation;
  text-decoration:none}
.prompt-toggle:hover{background:#1a2035;border-color:#3a4a70;color:#b0c0e0}
.prompt-toggle:active{opacity:.7;transform:scale(.97)}
.prompt-body{display:none;margin-top:12px;animation:fadeIn .2s ease;width:100%}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.prompt-box{
  background:#06070a;border:1px solid #141518;border-radius:10px;
  color:#7a8a9e;font-family:'Courier New',monospace;font-size:10px;line-height:1.9;
  padding:14px;white-space:pre-wrap;word-break:break-word;
  max-height:320px;overflow-y:auto;-webkit-overflow-scrolling:touch;
  user-select:text;-webkit-user-select:text}

/* ── DESKTOP LAYOUT ── */
@media(min-width:900px){
  .app{display:grid;grid-template-columns:380px 1fr;grid-template-rows:100dvh;flex-direction:unset}
  .sidebar{display:flex;flex-direction:column;border-right:1px solid #1e1f25;overflow-y:auto;height:100dvh;position:sticky;top:0}
  #output{overflow-y:auto;height:100dvh}
  .prompt-section{border-top:1px solid #1e1f25;flex-shrink:0;margin-top:auto}
  .editor{border-bottom:none;border-right:none;flex:1;overflow-y:auto;padding:16px 20px}
  .editor-top{gap:8px}
  .action-row-main{grid-template-columns:1fr 1fr}
  .json-area{height:clamp(180px,20vh,280px)}
}

@media(min-width:1200px){
  .app{grid-template-columns:420px 1fr}
}
</style>
</head>
<body>
<div class="app">

<!-- ── SIDEBAR ── -->
<div class="sidebar">

<!-- ── EDITOR ── -->
<div class="editor">
  <div class="editor-top">
    <span class="editor-title">Garmin Entreno</span>
    <div class="action-row-main">
      <button class="btn btn-render" onclick="render()">▶ Renderizar</button>
      <button class="btn btn-fit" onclick="document.getElementById('fit-input').click()">📁 Garmin</button>
      <input type="file" id="fit-input" accept=".fit,.zip" multiple style="display:none" onchange="loadFitOrZip(this)">
      <button class="btn btn-img" id="btn-img" onclick="saveImg()" style="display:none">Generar imagen</button>
      <button class="btn btn-copy-img" id="btn-copy-img" onclick="copyImg()" style="display:none">Copiar imagen</button>
      <button class="btn btn-clear" onclick="clearJson()">✕</button>
    </div>
    <div class="action-row-filter" id="filter-bar">
      <input class="filter-input" id="filter-input" type="text" placeholder="Ocultar filas que contengan… ej: Descanso"
        onkeydown="if(event.key==='Enter')applyFilter()">
      <button class="btn-filter-ok" onclick="applyFilter()">Ocultar</button>
      <button class="btn-filter-ok green" onclick="showAllRows()">Mostrar todo</button>
    </div>
  </div>
  <div class="json-wrap">
    <textarea class="json-area" id="json-input" spellcheck="false" autocorrect="off" autocapitalize="off"
      placeholder="Carga el .fit desde el botón Garmin"></textarea>
  </div>
  <div class="hint">Usa el botón Garmin para cargar archivos</div>
  <div class="error-msg" id="error-msg"></div>
</div>

<!-- ── GARMIN CONNECT ── -->
<div class="prompt-section">
  <a href="https://connect.garmin.com/app/activities" target="_blank" 
     class="prompt-toggle" style="text-decoration:none">
    <span>🌐 Garmin Connect</span>
  </a>
  <button class="prompt-toggle" onclick="togglePrompt()" style="margin-left:8px;display:none">
    <span class="prompt-toggle-arrow" id="toggle-arrow">▶</span>
    <span>Prompt</span>
  </button>
  <button class="btn btn-copy" onclick="copyPrompt()" style="min-height:38px;font-size:11px;padding:0 12px;display:none">Copiar</button>
</div>
<div class="prompt-body" id="prompt-body" style="display:none;">
</div>

</div><!-- .sidebar -->

<!-- ── OUTPUT ── -->
<div id="output">
  <div class="placeholder">
    <div class="placeholder-icon">⌁</div>
    <div class="placeholder-title">Sin datos</div>
    <div class="placeholder-sub">Carga el .fit desde el botón Garmin</div>
  </div>
</div>

</div><!-- .app -->

<script>
/* ── HELPERS ── */
const toKmh=s=>(!s||s<0.01)?'':(s*3.6).toFixed(1);
const toRitmo=s=>{
  if(!s||s<0.01)return'';
  const t=1000/s;
  const m=Math.floor(t/60),sc=Math.round(t%60);
  return m+':'+(sc<10?'0':'')+sc;
};
const ritmoSecs=s=>(!s||s<=0)?0:1000/s;
const secsToStr=t=>{if(!t||t<=0||!isFinite(t))return'';const m=Math.floor(t/60),s=Math.round(t%60);return m+':'+(s<10?'0':'')+s};
const avg=(arr,fn)=>arr.length?arr.reduce((a,r)=>a+fn(r),0)/arr.length:0;

// Garmin Connect zone colors (fixed by zone number, not by name)
// Garmin Connect canonical zone names (Zona 1-5 + descripción)
const ZONA_GARMIN=[
  {num:1,color:'#a0a0a0',desc:'Calentamiento'},
  {num:2,color:'#4a90e2',desc:'Suave'},
  {num:3,color:'#27ae60',desc:'Aeróbica'},
  {num:4,color:'#f39c12',desc:'Umbral'},
  {num:5,color:'#e74c3c',desc:'Máximo'},
];
// Build lookup by any variation of name
const ZONA_META={};
ZONA_GARMIN.forEach(function(z){
  var base='Zona '+z.num;
  [base,base+' '+z.desc,'Z'+z.num,'Z'+z.num+' '+z.desc,'Z'+z.num+' Recuperación',
   'Z'+z.num+' Calentamiento','Z'+z.num+' Suave','Z'+z.num+' Aeróbica','Z'+z.num+' Aeróbico',
   'Z'+z.num+' Tempo','Z'+z.num+' Umbral','Z'+z.num+' Anaeróbico','Z'+z.num+' Máximo',
   'Z'+z.num+' VO2max','Z'+z.num+' VOmax','Z'+z.num+' Vomax'].forEach(function(k){
    ZONA_META[k]={color:z.color,num:z.num,display:'Zona '+z.num+' · '+z.desc};
  });
});
function _normZonaNombre(n){
  // Returns canonical name for color lookup only, don't use for display
  if(!n)return n;
  var m=n.match(/^Z([1-5])/i);
  if(!m)return n;
  var num=parseInt(m[1]);
  if(num===1)return'Z1 Recuperación';
  if(num===2)return'Z2 Aeróbico';
  if(num===3)return'Z3 Tempo';
  if(num===4)return'Z4 Umbral';
  if(num===5)return'Z5 Anaeróbico';
  return n;
}
function zonaColor(nombre){var e=ZONA_META[nombre]||ZONA_META[_normZonaNombre(nombre)];return e?e.color:null;}
function zonaDisplay(nombre){var e=ZONA_META[nombre]||ZONA_META[_normZonaNombre(nombre)];return e?e.display:nombre;}
function zonaDot(nombre){return(ZONA_META[nombre]||{}).color||'#7a8a9e';}

// Zone range registry — populated from "rango" field in JSON data
// Falls back to empty string if not provided
const _zonaRangos={};
function registerZonaRango(nombre,rango){if(rango&&nombre)_zonaRangos[nombre]=rango;}
function zonaRange(nombre){return _zonaRangos[nombre]||'';}

function dKmh(c,p){
  const d=parseFloat(((c>=0.3?c*3.6:0)-(p>=0.3?p*3.6:0)).toFixed(1));
  if(d===0||Math.abs(d)<0.1)return'';
  return`<div class="sub ${d>0?'dn':'dp'}">${d>0?'+':'-'}${Math.abs(d)}</div>`;
}
function dKmhRaw(c,p){
  const d=parseFloat(((c>=0.3?c*3.6:0)-(p>=0.3?p*3.6:0)).toFixed(1));
  if(d===0||Math.abs(d)<0.9)return'0'; return(d>0?'▲ +':'▼ ')+d;
}
function dRitmoRaw(c,p){
  const diff=Math.round(ritmoSecs(c)-ritmoSecs(p));
  if(diff===0||Math.abs(diff)<0.9)return'0:00';
  const b=diff<0,sign=b?'-':'+',a=Math.abs(diff),m=Math.floor(a/60),s=a%60;
  return sym+' '+sign+(m>0?m+':'+(s<10?'0':'')+s:'0:'+(s<10?'0':'')+s);
}
function dFCRaw(c,p){
  const d=c-p; if(d===0||Math.abs(d)<0.9)return'0'; return(d>0?'▲ +':'▼ ')+d;
}
function dDescansoKmh(c,p){
  const cur=c>0?c:0;
  const ref=p>0?p:0;
  if(!cur&&!ref)return'';
  const d=parseFloat(((c>0?c*3.6:0)-(p>0?p*3.6:0)).toFixed(1));
  if(d===0||Math.abs(d)<0.1)return'';
  return'<div class="sub dg" style="opacity:0.2">'+(d>0?'+':'-')+Math.abs(d)+'</div>';
}
function dDescansoRitmo(c,p){
  const cur=c>0?c:0;
  const ref=p>0?p:0;
  if(!cur&&!ref)return'';
  const diff=Math.round(ritmoSecs(c)-ritmoSecs(p));
  if(diff===0||Math.abs(diff)<0.9)return'';
  const b=diff<0,sign=b?'-':'+';
  const a=Math.abs(diff),m=Math.floor(a/60),s=a%60;
  return'<div class="sub dg" style="opacity:0.2">'+sign+(m>0?m+':'+(s<10?'0':'')+s:'0:'+(s<10?'0':'')+s)+'</div>';
}
function dDescansoFC(c,p){
  const cur=c>0?c:0;
  const ref=p>0?p:0;
  if(!cur&&!ref)return'';
  const d=c-p;
  if(d===0||Math.abs(d)<0.1)return'';
  return'<div class="sub dg" style="opacity:0.2">'+(d>0?'+':'-')+Math.abs(d)+'</div>';
}
function _dCadRaw(c,p){
  var d=c-p; if(d===0||Math.abs(d)<0.1)return'';
  return'<div class="sub '+(d>0?'dn':'dp')+'">'+(d>0?'+':'-')+Math.abs(d)+'</div>';
}
function dRitmo(c,p){
  const diff=Math.round(ritmoSecs(c)-ritmoSecs(p));
  if(diff===0||Math.abs(diff)<0.9)return'';
  const b=diff<0,cls=b?'dn':'dp',sign=b?'-':'+';

}
function dFC(c,p){
  const d=c-p;
  if(d===0||Math.abs(d)<0.1)return'';
  return`<div class="sub ${d>0?'dp':'dn'}">${d>0?'+':'-'}${Math.abs(d)}</div>`;
}
function elevHtml(v){
  var n=parseInt(v)||0;
  if(n===0)return'<div class="elev dz">0m</div>';
  return n>0?`<div class="elev dp">▲ +${n}m</div>`:`<div class="elev dn">▼ ${Math.abs(n)}m</div>`;
}
function cellPlain(v,ev){
  return`<td><div class="metric"><div class="main">${v}</div>${ev!==undefined?elevHtml(ev):''}</div></td>`;
}

function zonaCellHtml(zonas_lap){
  if(!zonas_lap||!zonas_lap.length)return'<td class="td-zona"></td>';
  const total=Math.round(zonas_lap.reduce((a,z)=>a+z.secs,0));
  if(total===0)return'<td class="td-zona"></td>';
  const activas=zonas_lap.filter(z=>z.secs>0);
  const items=activas.map((z,i)=>{
    const secs=Math.round(z.secs);
    const pct=Math.round(secs/total*100);
    const m=Math.floor(secs/60),s=secs%60;
    var zEntry=ZONA_META[z.nombre]||ZONA_META[_normZonaNombre(z.nombre)]||{};
    const short='Z'+(zEntry.num||z.nombre.match(/\d/)||'?');
    const col=zonaColor(z.nombre)||z.color;
    const last=i===activas.length-1;
    return`<div style="${last?'':'margin-bottom:4px'}">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">
        <span style="font-size:8px;color:${col};font-weight:700;letter-spacing:.3px">${short}</span>
        <span style="font-size:7.5px;color:#ccc;padding-left:6px">${m}:${s<10?'0':''}${s}<span style="color:#555"> · ${pct}%</span></span>
      </div>
      <div style="height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${col};border-radius:3px"></div>
      </div>
    </div>`;
  }).join('');
  return`<td class="td-zona">
    <div style="display:block;text-align:left;min-width:110px">${items}</div>
  </td>`;
}

function aggregateZones(rows){
  const map={};
  rows.forEach(r=>{
    (r.zonas_lap||[]).forEach(z=>{
      if(!map[z.nombre])map[z.nombre]={...z,secs:0};
      map[z.nombre].secs+=z.secs;
    });
  });
  return Object.values(map).filter(z=>z.secs>0);
}

/* ── TOGGLE GROUP ── */
function _toggleGroup(groupId){
  var header=document.getElementById(groupId);
  if(!header)return;
  var arrow=header.querySelector('.group-arrow');
  var next=header.nextElementSibling;
  var collapsed=arrow&&arrow.classList.contains('collapsed');
  while(next&&(next.classList.contains('group-lap'))){
    next.style.display=collapsed?'':'none';
    next=next.nextElementSibling;
  }
  if(arrow)arrow.classList.toggle('collapsed');
}

/* ── LAP HELPERS (module-level for iOS Safari compat) ── */
var _actId='';
var _rowIdx=0;
function _lapDurSecs(row){
  // Priority: use explicit duration field first (from .fit direct)
  if(row.dur_secs&&row.dur_secs>0)return Math.round(row.dur_secs);
  if(row.duration&&row.duration>0)return Math.round(row.duration);
  // If no explicit duration but we have speed, DON'T calc - just return null
  // (let the UI show -- instead of wrong calculated values)
  return null;
}
function _durHtml(row){
  var d=_lapDurSecs(row);
  return d?'<div class="sub dz">'+secsToStr(d)+'</div>':'';
}
function _hideBtn(idx){
  return '<button class="hide-btn" onclick="var el=document.getElementById(\''+_actId+'r'+idx+'\');if(el)el.classList.add(\'row-hidden\')" title="Ocultar fila">✕</button>';
}
// Normalizar etiquetas de warmup/cooldown a español
function _normLabel(label){
  if(!label)return label;
  var l=label.trim();
  if(/^(cooldown|cool.?down|enfriamiento|recovery|vuelta.?calma)$/i.test(l))return'Recuperación';
  if(/^(warmup|warm.?up|calentamiento)$/i.test(l))return'Calentamiento';
  if(/^(rest|rec\s*\d*|recuperaci[oó]n\s*\d*)$/i.test(l)){
    var num=l.match(/\d+/);
    return num?'Descanso '+num[0]:'Descanso';
  }
  return l;
}
function _cadCell(cad, cadPrev, isDesc){
  // Always return a td - show "—" if no cadence or too low
  if(!cad||cad===0||cad<10)return'<td><div class="metric"><div class="main">—</div></div></td>';
  var out = '<td><div class="metric"><div class="main">'+cad+'</div>';
  if(cadPrev !== undefined && cadPrev !== null && cadPrev > 0){
    var d = cad - cadPrev;
    if(Math.abs(d) >= 0.1){
      var sign = d>0?'+':'-';
      var cls = d>0?'dp':'dn';
      if(isDesc){
        out += '<div class="sub '+cls+'" style="opacity:0.2">'+sign+Math.abs(d)+'</div>';
      }else{
        out += '<div class="sub '+cls+'">'+sign+Math.abs(d)+'</div>';
      }
    }
  }
  out += '</div></td>';
  return out;
}
var _descansoRe=/descanso|recuperaci[oó]n|rec\s*\d|rest\b|calentamiento|warmup|cooldown|enfriamiento/i;
function _isDescanso(s){
  // Check label AND _intensityType
  var labelMatch=_descansoRe.test(s.label||'');
  var intensityMatch=s._intensityType==='REST'||s._intensityType==='RECOVERY';
  return labelMatch||intensityMatch;
}

function _distributeZones(lap,zonaRef,fcMin,fcMax,fcRange){
  if(!lap)return;
  if(lap.zonas_lap&&lap.zonas_lap.length>0)return;
  var dur=lap.dur_secs||Math.round(lap.dist_km*1000/(lap.speed||1));
  var tot=zonaRef.reduce(function(a,z){return a+z.secs;},0);
  if(!tot){lap.zonas_lap=[];return;}
  // FC factor: 0=FC mínima de sesión, 1=FC máxima
  var fcFactor=lap.fc_med>0?(lap.fc_med-fcMin)/(fcRange||1):0.5;
  // Clamp between 0 y 1
  fcFactor=Math.max(0,Math.min(1,fcFactor));
  lap.zonas_lap=zonaRef.filter(function(z){return z.secs>0;}).map(function(z){
    var zNum=parseInt(z.nombre.replace(/\D/g,''))||3;
    var basePct=z.secs/tot;
    // Para cada zona, calcular peso según FC del lap
    // Z5: solo existe si FC muy alta. Z1: solo si FC muy baja.
    var adjPct;
    if(zNum===5){
      // Z5: sube exponencialmente con FC alta
      adjPct=basePct*Math.pow(fcFactor,0.5)*2.5;
    } else if(zNum===4){
      // Z4: máximo en FC media-alta
      adjPct=basePct*(0.4+fcFactor*1.2);
    } else if(zNum===3){
      // Z3: relativamente estable, ligero pico en FC media
      adjPct=basePct*(0.7+fcFactor*0.6);
    } else if(zNum===2){
      // Z2: más presente en FC media-baja
      adjPct=basePct*(1.8-fcFactor*1.2);
    } else {
      // Z1: solo en FC muy baja
      adjPct=basePct*Math.pow(1-fcFactor,0.8)*3;
    }
    return{nombre:z.nombre,secs:Math.max(0,Math.round(adjPct*dur)),rango:z.rango||'',color:z.color};
  }).filter(function(z){return z.secs>0;});
  // Renormalizar para que sumen exactamente dur
  var s=lap.zonas_lap.reduce(function(a,z){return a+z.secs;},0);
  if(s>0&&s!==dur){var sc=dur/s;lap.zonas_lap.forEach(function(z){z.secs=Math.round(z.secs*sc);});}
}

/* ── RENDER ACTIVIDAD ── */
function renderActividad(d){
  var seriesArr=d.series?d.series.slice():[]; // copy to avoid mutation of original
  var rawWarmup=d.warmup||null;
  var rawCooldown=d.cooldown||null;
  var warmup=(rawWarmup&&rawWarmup.speed)?rawWarmup:null;
  var cooldown=(rawCooldown&&rawCooldown.speed)?rawCooldown:null;
  var zonas=d.zonas||[];
  zonas.forEach(function(z){if(z.rango)registerZonaRango(z.nombre,z.rango);});
  seriesArr.forEach(function(s){(s.zonas_lap||[]).forEach(function(z){if(z.rango)registerZonaRango(z.nombre,z.rango);});});
  var modo=(d.modo||'intervalos').toLowerCase();
  var esCarrera=['carrera','long_run'].indexOf(modo)>=0;
  var esLibre=['sesión libre','sesion libre'].indexOf(modo)>=0;
  var esIntervalos=!esCarrera&&!esLibre;
  function normD(v){if(typeof v==='number')return v;var n=parseInt(v);return isNaN(n)?0:n;}
  if(warmup)warmup.desnivel=normD(warmup.desnivel);
  if(cooldown)cooldown.desnivel=normD(cooldown.desnivel);
  seriesArr.forEach(function(s){s.desnivel=normD(s.desnivel);});

  // Promote warmup/cooldown labels from series array if needed
  if(!warmup&&seriesArr.length&&/warmup|calentamiento/i.test(seriesArr[0].label||'')){
    warmup=seriesArr.shift();
  }
  if(!cooldown&&seriesArr.length&&/cooldown|enfriamiento|^recovery$/i.test(seriesArr[seriesArr.length-1].label||'')){
    cooldown=seriesArr.pop();
  }

  // FC range for zone distribution weighting
  var allFCArr=[];
  if(warmup&&warmup.fc_med>0)allFCArr.push(warmup.fc_med);
  seriesArr.forEach(function(s){if(s.fc_med>0)allFCArr.push(s.fc_med);});
  if(cooldown&&cooldown.fc_med>0)allFCArr.push(cooldown.fc_med);
  var fcMinAll=allFCArr.length?Math.min.apply(null,allFCArr):100;
  var fcMaxAll=allFCArr.length?Math.max.apply(null,allFCArr):200;
  var fcRangeAll=fcMaxAll-fcMinAll||1;

  var totalZonaSecs=zonas.reduce(function(a,z){return a+z.secs;},0);
  var allEmpty=seriesArr.every(function(s){return!s.zonas_lap||s.zonas_lap.length===0;});
  if(allEmpty&&zonas.length&&totalZonaSecs>0){
    seriesArr.forEach(function(s){_distributeZones(s,zonas,fcMinAll,fcMaxAll,fcRangeAll);});
  }
  _distributeZones(warmup,zonas,fcMinAll,fcMaxAll,fcRangeAll);
  _distributeZones(cooldown,zonas,fcMinAll,fcMaxAll,fcRangeAll);

  // Pill: max FC only on active series
  var activeSer=seriesArr.filter(function(s){return!_isDescanso(s);});
  var maxFCxVal=activeSer.length?Math.max.apply(null,activeSer.map(function(s){return s.fc_max;})):0;
  var maxHRIdx=maxFCxVal>0?seriesArr.findIndex(function(s){return!_isDescanso(s)&&s.fc_max===maxFCxVal;}):-1;

var allR=[];
  if(warmup)allR.push(warmup);
  seriesArr.forEach(function(s){allR.push(s);});
  if(cooldown)allR.push(cooldown);

  var desnivelAcum=allR.reduce(function(a,r){var n=parseInt(r.desnivel)||0;return a+(n>0?n:0);},0);
  function ravg(arr,fn){return arr.length?arr.reduce(function(a,r){return a+fn(r);},0)/arr.length:0;}
  // Media sesión: TODO (warmup + series + descansos + cooldown)
  var validAllR=allR.filter(function(r){return r.speed>=0.01;});
  var validAllRWithHR=allR.filter(function(r){return r.fc_med>=0.01;});
  var avgKmhSes=validAllR.length?ravg(validAllR,function(r){return r.speed*3.6;}).toFixed(1):'—';
  // Avg ritmo media sesión: TODO
  var avgRSSes=allR.length?ravg(allR,function(r){var rs=ritmoSecs(r.speed);return rs>0&&rs<1800?rs:1800;}):null;
  // FC media sesión: TODO
  var avgFCmSes=validAllRWithHR.length?Math.round(ravg(validAllRWithHR,function(r){return r.fc_med;})):'—';
  // FC max sesión: máximo de TODO
  var fcMaxAll=allR.filter(function(r){return r.fc_max>0;});
  var avgFCxSes=fcMaxAll.length?Math.max.apply(null,fcMaxAll.map(function(r){return r.fc_max;})):'—';
  // Media series: SOLO series activas (no rests, no warmup, no cooldown)
  var activeOnlyArr=seriesArr.filter(function(s){return!_isDescanso(s);});
  var activeOnlyArrWithFC=activeOnlyArr.filter(function(r){return r.fc_med>0;});
  var avgKmhSer=activeOnlyArr.length?ravg(activeOnlyArr,function(r){return r.speed*3.6;}).toFixed(1):'—';
  var avgRSSer=activeOnlyArr.length?ravg(activeOnlyArr,function(r){var rs=ritmoSecs(r.speed);return rs>0&&rs<1800?rs:1800;}):null;
  var avgDSer=activeOnlyArr.length?(activeOnlyArr.reduce(function(a,r){return a+r.dist_km;},0)/activeOnlyArr.length).toFixed(2)+' km':'—';
  var avgFCmSer=activeOnlyArrWithFC.length?Math.round(ravg(activeOnlyArrWithFC,function(r){return r.fc_med;})):'—';
  var avgFCxSer=activeOnlyArr.length?Math.max.apply(null,activeOnlyArr.filter(function(r){return r.fc_max>0}).map(function(r){return r.fc_max;})):'—';
  var cadArr=validAllR.filter(function(r){return r.cadencia>0;});
  var avgCadSes=cadArr.length?Math.round(ravg(cadArr,function(r){return r.cadencia;})):'—';
  var cadSerArr=activeOnlyArr.filter(function(r){return r.cadencia>0;});
  var avgCadSer=cadSerArr.length?Math.round(ravg(cadSerArr,function(r){return r.cadencia;})):'—';

  // Apply label normalization to all rows
  if(warmup)warmup.label=_normLabel(warmup.label)||'Calentamiento';
  if(cooldown)cooldown.label=_normLabel(cooldown.label)||'Recuperación';
  seriesArr.forEach(function(s){s.label=_normLabel(s.label)||s.label;});
  // Re-detect cooldown after normalization
  if(!cooldown&&seriesArr.length){
    var lastL=seriesArr[seriesArr.length-1];
    if(/^(recuperaci[oó]n|enfriamiento)$/i.test(lastL.label||'')){
      cooldown=seriesArr.pop(); cooldown.label='Recuperación';
    }
  }

  _actId='a'+Math.random().toString(36).slice(2,6);
  _rowIdx=0;
  var rows='';

  // ── Helper: render a single data row (lap o phase summary) ──
  function _dataRow(s, ref, isDesc, isPill, rowClass, indentPx, hideButton){
    var ri=_rowIdx++;
    var rowId=_actId+'r'+ri;
    var isPillByVal=s.fc_max>0&&s.fc_max===maxFCxVal&&!isDesc;
    var fcmaxVal=isPillByVal?'<span class="fc-max-pill">'+s.fc_max+'</span>':''+s.fc_max;
    var lbl=s.label||'—';
    // Show duration if NOT a simple number (continuous run = just "1", "2", etc.)
    var isJustNumber=/^\d+$/.test(lbl);
    var dur=!isJustNumber?_lapDurSecs(s):null;
    var durSpan=dur?'<span style="font-size:9px;color:#454a55;margin-left:7px;font-weight:400">'+secsToStr(dur)+'</span>':'';
    var labelHtml='<div class="lap-label-cell"><div class="lap-label-row">'
      +(indentPx?'<span style="display:inline-block;width:'+indentPx+'px;flex-shrink:0"></span>':'')
      +'<span style="'+(isDesc?'color:#252830':'')+'">'+lbl+'</span>'
      +durSpan
      +(hideButton?_hideBtn(ri):'')
      +'</div></div>';

var hasRef=ref!==null;
    // For descanso: show delta only if main value exists AND we have a reference
    if(isDesc){
      var speedVal=s.speed||0;
      var distVal=s.dist_km||0;
      // hasSpeedData = any valid speed (even very low)
      var hasSpeedData=speedVal>0.01;
      // Delta only if there's data to display AND we have a reference - in GREY for descansos
      var dKmhM=hasRef&&hasSpeedData?dDescansoKmh(speedVal,ref.speed):'';
      var dRitmoM=hasRef&&hasSpeedData?dDescansoRitmo(speedVal,ref.speed):'';
      var dFCmM=hasRef&&s.fc_med>0?dDescansoFC(s.fc_med,ref.fc_med):'';
      var dFCxM=hasRef&&s.fc_max>0?dDescansoFC(s.fc_max,ref.fc_max):'';
      var kmhVal=hasSpeedData?toKmh(speedVal):'';
      var ritmoVal=hasSpeedData?toRitmo(speedVal):'';
      var cadVal=s.cadencia>0?s.cadencia:'';
      // FC siempre aparece (si hay dato, si no vacío)
      var fcMedVal=s.fc_med>0?s.fc_med:'';
      var fcMaxVal=s.fc_max>0?s.fc_max:'';
      var distDisplay=distVal>=0?(distVal>0?distVal.toFixed(2)+' km':'0.00 km'):'';
      var elevDisplay=distDisplay?elevHtml(s.desnivel, ref&&ref.desnivel):'';
var rowClassDesc=isDesc?' desc-row':'';
    var descStyle=isDesc?'style="color:#252830"':'';
    return '<tr id="'+rowId+'" class="'+(rowClass||'')+rowClassDesc+'">'
        +'<td>'+labelHtml+'</td>'
        +'<td><div class="metric"><div class="main" '+descStyle+'>'+distDisplay+'</div>'+elevDisplay+'</div></td>'
        +'<td><div class="metric"><div class="main" '+descStyle+'>'+kmhVal+'</div>'+dKmhM+'</div></td>'
        +(cadVal?'<td><div class="metric"><div class="main" '+descStyle+'>'+cadVal+'</div></td>':'<td></td>')
        +'<td><div class="metric"><div class="main" '+descStyle+'>'+ritmoVal+'</div>'+dRitmoM+'</div></td>'
        +'<td><div class="metric"><div class="main" '+descStyle+'>'+fcMedVal+'</div>'+dFCmM+'</div></td>'
        +'<td><div class="metric"><div class="main" '+descStyle+'>'+fcMaxVal+'</div>'+dFCxM+'</div></td>'
        +zonaCellHtml(s.zonas_lap)+'</tr>';
    } else {
return '<tr id="'+rowId+'" class="'+(rowClass||'')+(isDesc?' desc-row':'')+'">'
        +'<td>'+labelHtml+'</td>'
        +'<td><div class="metric"><div class="main">'+s.dist_km.toFixed(2)+' km</div>'+elevHtml(s.desnivel)+'</div></td>'
        +'<td><div class="metric"><div class="main">'+toKmh(s.speed)+'</div>'+(hasRef?dKmh(s.speed,ref.speed):'')+'</div></td>'
        +_cadCell(s.cadencia,hasRef?ref.cadencia:0,false)
        +'<td><div class="metric"><div class="main">'+toRitmo(s.speed)+'</div>'+(hasRef?dRitmo(s.speed,ref.speed):'')+'</div></td>'
        +'<td><div class="metric"><div class="main">'+s.fc_med+'</div>'+(hasRef?dFC(s.fc_med,ref.fc_med):'')+'</div></td>'
        +'<td><div class="metric"><div class="main">'+fcmaxVal+'</div>'+(hasRef?dFC(s.fc_max,ref.fc_max):'')+'</div></td>'
        +zonaCellHtml(s.zonas_lap)+'</tr>';
    }
  }

  // ── Helper: build a synthetic summary lap from an array of laps ──
  function _synthLap(laps, labelStr){
    if(!laps.length)return null;
    var validLaps=laps.filter(function(l){return l.speed>=0.0000001;});
    if(!validLaps.length)validLaps=laps;
    var totDur=laps.reduce(function(a,l){return a+(l.dur_secs||0);},0);
    var totDist=laps.reduce(function(a,l){return a+l.dist_km;},0);
    var avgSpd=totDist>0&&totDur>0?totDist*1000/totDur:(validLaps[0].speed||0);
    var avgFCm=Math.round(validLaps.reduce(function(a,l){return a+l.fc_med;},0)/validLaps.length);
    var maxFCx=Math.max.apply(null,validLaps.map(function(l){return l.fc_max;}));
    var cadLaps=validLaps.filter(function(l){return l.cadencia>0;});
    var avgCad=cadLaps.length?Math.round(cadLaps.reduce(function(a,l){return a+(l.cadencia||0);},0)/cadLaps.length):0;
    var desnTot=laps.reduce(function(a,l){return a+(parseInt(l.desnivel)||0);},0);
    var zmap={};
    laps.forEach(function(l){(l.zonas_lap||[]).forEach(function(z){
      if(!zmap[z.nombre])zmap[z.nombre]={nombre:z.nombre,secs:0,rango:z.rango||'',color:z.color};
      zmap[z.nombre].secs+=z.secs;
    });});
    return{label:labelStr,speed:avgSpd,dist_km:totDist,dur_secs:totDur,
      desnivel:desnTot,fc_med:avgFCm,fc_max:maxFCx,cadencia:avgCad,
      zonas_lap:Object.values(zmap).filter(function(z){return z.secs>0;})};
  }

  // ── Group series into intervals ──
  // An interval = one or more active laps + their following descanso(s) before next active lap
  // Warmup and cooldown are standalone phases
  function _buildGroups(laps){
    var groups=[]; // [{type:'warmup'|'cooldown'|'interval', laps:[...], activeLaps:[...], num:N}]
    var intervalNum=0;
    var i=0;
    while(i<laps.length){
      var s=laps[i];
      // Check if this is a standalone calentamiento/recuperación at start or end
      if(/^calentamiento$/i.test(s.label||'')){
        groups.push({type:'warmup',laps:[s]});i++;continue;
      }
      if(/^(recuperaci[oó]n|enfriamiento)$/i.test(s.label||'')){
        groups.push({type:'cooldown',laps:[s]});i++;continue;
      }
      // Active lap → start a new interval group
      if(!_isDescanso(s)){
        intervalNum++;
        var grp={type:'interval',num:intervalNum,laps:[],activeLaps:[]};
        // Collect all laps until next active lap (after at least one descanso gap)
        grp.laps.push(s);
        grp.activeLaps.push(s);
        i++;
        while(i<laps.length){
          var next=laps[i];
          // Stop if this is a new active lap and we've already had a descanso
          var hadDescanso=grp.laps.some(function(l){return _isDescanso(l);});
          if(!_isDescanso(next)){
            if(hadDescanso)break; // new interval
            // consecutive active laps belong to same interval
            grp.laps.push(next);grp.activeLaps.push(next);i++;
          } else {
            grp.laps.push(next);i++;
          }
        }
        groups.push(grp);
      } else {
        // Orphan descanso (shouldn't happen normally) — attach to previous group or skip
        if(groups.length)groups[groups.length-1].laps.push(s);
        i++;
      }
    }
    return groups;
  }

  var lastActiveLap=warmup||null;

  if(esIntervalos){
    // ── INTERVALOS: agrupado estilo Garmin ──
    var allSeriesForGroup=[];
    seriesArr.forEach(function(s){allSeriesForGroup.push(s);});
    // Include warmup/cooldown from seriesArr that weren't promoted
    var groups=_buildGroups(allSeriesForGroup);

    // Also render actual warmup/cooldown objects
    if(warmup){
      var wi=_rowIdx++;
      var wsyn=_synthLap([warmup],'Calentamiento');
      var wgid=_actId+'g'+wi;
      rows+='<tr id="'+wgid+'" class="phase-header" onclick="_toggleGroup(\''+wgid+'\')">'
        +'<td><span class="group-arrow">▼</span>Calentamiento'
        +'<span style="font-size:9px;color:#454a55;margin-left:8px">'+secsToStr(warmup.dur_secs||0)+'</span>'
        +'</td>'
        +'<td><div class="metric"><div class="main">'+warmup.dist_km.toFixed(2)+' km</div></div></td>'
        +'<td><div class="metric"><div class="main">'+toKmh(warmup.speed)+'</div></div></td>'
        +'<td><div class="metric"><div class="main">'+(warmup.cadencia||'—')+'</div></div></td>'
        +'<td><div class="metric"><div class="main">'+toRitmo(warmup.speed)+'</div></div></td>'
        +'<td><div class="metric"><div class="main">'+warmup.fc_med+'</div></div></td>'
        +'<td><div class="metric"><div class="main">'+warmup.fc_max+'</div></div></td>'
        +zonaCellHtml(warmup.zonas_lap)+'</tr>';
      // Sub-rows hidden by default for phase headers with single lap (auto-show)
      rows+=_dataRow(warmup,null,false,false,'group-lap',20,true);

/* ── DETECT AND NORMALIZE CHATGPT NESTED FORMAT ── */
// ChatGPT sometimes returns { activity_id, name, series: [{label, laps:[...]}, ...], zones:[...] }
function fromChatGPTNested(raw){
  if(!raw.series||!Array.isArray(raw.series))return null;
  if(!raw.series[0]||!raw.series[0].laps)return null;

  const name=raw.name||raw.activity_name||'';
  const date=raw.date||raw.start_time_local||'';
  const MESES=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  let fechaFmt='';
  const dm=date.match(/(\d+)\s+([A-Za-z]+)/);
  if(dm){fechaFmt=dm[0];}
  // Try "22 Apr 2026" format
  const dmy=date.match(/(\d+)\s+(\w+)\s+\d+/);
  if(dmy){
    const monMap={Jan:'Ene',Feb:'Feb',Mar:'Mar',Apr:'Abr',May:'May',Jun:'Jun',Jul:'Jul',Aug:'Ago',Sep:'Sep',Oct:'Oct',Nov:'Nov',Dec:'Dic'};
    fechaFmt=dmy[1]+' '+(monMap[dmy[2]]||dmy[2]);
  }

  const tipo=({treadmill_running:'CINTA',running:'ASFALTO',cycling:'BICI',swimming:'NATACIÓN'})[raw.type||'']||'CINTA';
  const totalDist=((raw.distance_total_km||0)).toFixed(2);

  // Build global zones from raw.zones
  const ZONE_NAMES={Z1:'Zona 1 · Calentamiento',Z2:'Zona 2 · Suave',Z3:'Zona 3 · Aeróbica',Z4:'Zona 4 · Umbral',Z5:'Zona 5 · Máximo'};
  const ZONE_COLORS={Z1:'#a0a0a0',Z2:'#4a90e2',Z3:'#27ae60',Z4:'#f39c12',Z5:'#e74c3c'};
  const zonas=(raw.zones||[]).filter(z=>z.secs>0).sort((a,b)=>{
    const n=x=>parseInt(x.zone?.replace('Z','')||0);return n(b)-n(a);
  }).map(z=>({
    nombre:ZONE_NAMES[z.zone]||z.zone,
    secs:z.secs,
    rango:z.rango||'',
    color:ZONE_COLORS[z.zone]||'#888'
  }));

  // Flatten all laps from all series into a flat list
  let warmup=null,cooldown=null,series=[];
  let activeCount=0;

  raw.series.forEach(sg=>{
    const lbl=(sg.label||'').toLowerCase();
    const isWarm=lbl.includes('warmup')||lbl.includes('calentamiento');
    const isCool=lbl.includes('cooldown')||lbl.includes('recuperaci')||lbl.includes('recovery');

    (sg.laps||[]).forEach(lap=>{
      const isRec=lap.type==='recovery'||lap.type==='rest';
      const s={
        label:'',
        speed:lap.speed||0,
        dist_km:lap.dist_km||0,
        dur_secs:lap.dur_secs||0,
        cadencia:Math.round(lap.cadence||0),
        desnivel:lap.desnivel||0,
        fc_med:lap.fc_med||0,
        fc_max:lap.fc_max||0,
        zonas_lap:lap.zonas_lap||[]
      };

      if(isWarm&&!series.length&&!warmup){s.label='Calentamiento';warmup=s;}
      else if(isCool&&!isRec){s.label='Recuperación';cooldown=s;}
      else if(isRec){
        const recN=series.filter(x=>_isDescanso&&/descanso/i.test(x.label)).length+1;
        s.label=`Descanso ${recN}`;series.push(s);
      } else {
        activeCount++;s.label=`Serie ${activeCount}`;series.push(s);
      }
    });
  });

  return{fecha:fechaFmt,nombre:name,tipo,modo:'intervalos',estructura:null,
    distancia_total:totalDist+' km',warmup,series,cooldown,zonas};
}

/* ── EXTRACT JSON ── */
function sanitizeJson(s){
  // Fix common malformed patterns like "zone": 5": 0.0 → "zone5": 0.0 or remove bad entries
  return s
    .replace(/"zone":\s*(\d+)":/g,'"zone$1":') // "zone": 5": → "zone5":
    .replace(/,\s*}/g,'}')   // trailing commas
    .replace(/,\s*]/g,']');  // trailing commas in arrays
}
function extractJson(text){
  // Try direct parse
  try{return JSON.parse(text);}catch(e){}
  // Try sanitized
  try{return JSON.parse(sanitizeJson(text));}catch(e){}
  // Try CSV format
  const lines=text.trim().split('\n');
  if(lines.length>=2&&lines[0].includes('activity_id')&&lines[0].includes('type')){
    const header=lines[0].split(',').map(h=>h.trim());
    const actId=header.indexOf('activity_id');
    const actName=header.indexOf('activity_name');
    const start=header.indexOf('start_time_local');
    const type=header.indexOf('type');
    const dist=header.indexOf('dist_km');
    const dur=header.indexOf('duration_s');
    const hrAvg=header.indexOf('avg_hr');
    const hrMax=header.indexOf('max_hr');
    const cad=header.indexOf('avg_cadence');
    const laps=[];
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const cols=lines[i].split(',');
      const d=dist>=0?parseFloat(cols[dist])||0:0;
      const t=dur>=0?parseFloat(cols[dur])||0:0;
      const spd=t>0?(d*1000)/t:0; // speed in m/s (dist_km * 1000 / dur_secs)
      laps.push({
        type:(type>=0?cols[type]:'ACTIVE').trim(),
        dist_km:d,
        dur_secs:t,
        speed:spd,
        fc_med:hrAvg>=0?parseFloat(cols[hrAvg])||0:0,
        fc_max:hrMax>=0?parseFloat(cols[hrMax])||0:0,
        cadencia:cad>=0?Math.round(parseFloat(cols[cad])||0):0
      });
    }
    return{
      activity_id:actId>=0?cols[actId]:'',
      activity_name:actName>=0?cols[actName]:'',
      start_time_local:start>=0?cols[start]:'',
      laps:laps
    };
  }
  // Find all ```json blocks
  const fences=[...text.matchAll(/```(?:json)?\s*([\s\S]*?)```/g)].map(m=>m[1].trim());
  if(fences.length===1){try{return JSON.parse(fences[0]);}catch(e){try{return JSON.parse(sanitizeJson(fences[0]));}catch(e2){}}}
  if(fences.length>1){
    // Multiple blocks — try to merge as actividades_raw
    const parsed=fences.map(f=>{try{return JSON.parse(f);}catch(e){return null;}}).filter(Boolean);
    if(parsed.length>1){
      // Each block might be one activity
      const acts=[];
      parsed.forEach(p=>{
        if(p.actividades_raw)acts.push(...p.actividades_raw);
        else if(p.laps)acts.push(p);
        else if(p.actividades)acts.push(...p.actividades);
      });
      if(acts.length>1)return{actividades_raw:acts};
      if(acts.length===1)return acts[0];
    }
    if(parsed.length===1)return parsed[0];
  }
  // Try extracting largest { } block
  const first=text.indexOf('{'),last=text.lastIndexOf('}');
  if(first!==-1&&last>first){try{return JSON.parse(text.slice(first,last+1));}catch(e){}}
  return null;
}

/* ── NORMALIZE RAW GARMIN: handle any field name variant ── */
function _normLap(lap){
  // Normalize intensity type from various field names
  const raw_type=(lap.intensityType||lap.type||lap.lapType||'ACTIVE').toUpperCase();
  // Map variants
  const intensityMap={
    'WARMUP':'WARMUP','WARM_UP':'WARMUP','CALENTAMIENTO':'WARMUP','INTERVAL_WARMUP':'WARMUP',
    'ACTIVE':'ACTIVE','INTERVAL_ACTIVE':'ACTIVE','RUN':'ACTIVE','RWD_RUN':'ACTIVE',
    'INTERVAL':'ACTIVE','REGULAR':'ACTIVE',
    'REST':'REST','INTERVAL_RECOVERY':'REST','RWD_STAND':'REST','RWD_STOP':'REST','RWD_WALK':'REST',
    'RECOVERY':'RECOVERY','COOLDOWN':'RECOVERY','COOL_DOWN':'RECOVERY',
    'ACTIVE_FINISH':'ACTIVE','FINISH':'ACTIVE'
  };
  const intensity=intensityMap[raw_type]||'ACTIVE';
  const distance=lap.distance||lap.distanceMeters||lap.distance_m||(lap.dist_km?lap.dist_km*1000:0)||0;
  const duration=lap.duration||lap.totalElapsedTime||lap.elapsedDuration||lap.dur_secs||lap.duration_s||0;
  const movingDuration=lap.movingDuration||lap.moving_duration||lap.moving_duration_s||0;
  // Speed preference: averageSpeed (real avg over lap) > moving speed > calculated from dist/dur
  const avgSpeed=lap.averageSpeed||lap.avg_speed||lap.avg_speed_mps||lap.speed||0;
  const avgMovSpeed=lap.averageMovingSpeed||lap.avg_moving_speed||0;
  const calcSpeed=(distance>0&&duration>0)?distance/duration:0;
  const finalSpeed=avgSpeed||avgMovSpeed||calcSpeed;
  const avgHR=lap.averageHR||lap.averageHeartRate||lap.avgHR||lap.avg_hr||lap.fc_med||0;
  const maxHR=lap.maxHR||lap.maxHeartRate||lap.max_hr||lap.fc_max||0;
  const cadence=lap.avgRunningCadence||lap.averageRunCadence||lap.avgRunningCadence||lap.avg_cadence||lap.avg_run_cadence||lap.averageCadence||lap.cadencia||lap.cadence||0;
  // wktStepIndex: same value across laps from one workout step (auto-lap can split a step)
  const wktStepIndex=(lap.wktStepIndex!==undefined&&lap.wktStepIndex!==null)?lap.wktStepIndex:null;
  return{
    intensityType:intensity,
    distance,duration,movingDuration,
    averageSpeed:finalSpeed,
    averageMovingSpeed:finalSpeed,
    averageHR:avgHR,
    maxHR:maxHR,
    averageRunCadence:cadence,
    elevationGain:lap.elevationGain||lap.totalAscent||lap.ascent||lap.elevation_gain||0,
    elevationLoss:lap.elevationLoss||lap.totalDescent||lap.descent||lap.elevation_loss||0,
    hrTimeInZone:lap.hrTimeInZone||lap.hr_time_in_zones||[],
    wktStepIndex:wktStepIndex
  };
}

/* ── MERGE LAPS SPLIT BY AUTO-LAP ── */
// Garmin auto-lap (e.g. every 1 km) can split a single workout step into multiple laps.
// These split laps share the same wktStepIndex and intensityType. Merge them back.
function _mergeAutoLapSplits(laps){
  if(!laps.length)return laps;
  // Only merge when wktStepIndex is informative (at least one lap has a real value)
  const hasWkt=laps.some(l=>l.wktStepIndex!==null&&l.wktStepIndex!==undefined);
  if(!hasWkt)return laps;
  const out=[];
  for(const lap of laps){
    const prev=out[out.length-1];
    const sameStep=prev
      &&prev.wktStepIndex!==null&&prev.wktStepIndex!==undefined
      &&lap.wktStepIndex!==null&&lap.wktStepIndex!==undefined
      &&prev.wktStepIndex===lap.wktStepIndex
      &&prev.intensityType===lap.intensityType;
    if(!sameStep){out.push({...lap});continue;}
    // Merge: sums for distance/duration, weighted means for HR/speed/cadence, max for maxHR
    const totDur=(prev.duration||0)+(lap.duration||0);
    const totDist=(prev.distance||0)+(lap.distance||0);
    const wAvg=(a,b,wa,wb)=>{const t=wa+wb;return t>0?(a*wa+b*wb)/t:(a||b||0);};
    prev.distance=totDist;
    prev.duration=totDur;
    prev.movingDuration=(prev.movingDuration||0)+(lap.movingDuration||0);
    prev.averageSpeed=totDur>0?totDist/totDur:wAvg(prev.averageSpeed,lap.averageSpeed,prev.duration,lap.duration);
    prev.averageMovingSpeed=prev.averageSpeed;
    prev.averageHR=Math.round(wAvg(prev.averageHR,lap.averageHR,prev.duration,lap.duration));
    prev.maxHR=Math.max(prev.maxHR||0,lap.maxHR||0);
    prev.averageRunCadence=Math.round(wAvg(prev.averageRunCadence,lap.averageRunCadence,prev.duration,lap.duration));
    prev.elevationGain=(prev.elevationGain||0)+(lap.elevationGain||0);
    prev.elevationLoss=(prev.elevationLoss||0)+(lap.elevationLoss||0);
    // Sum hrTimeInZone arrays per zone
    if(lap.hrTimeInZone&&lap.hrTimeInZone.length){
      const acc={};
      (prev.hrTimeInZone||[]).forEach(z=>{acc[z.zoneNumber]={...z};});
      lap.hrTimeInZone.forEach(z=>{
        const k=z.zoneNumber;
        if(acc[k])acc[k].secsInZone=(acc[k].secsInZone||0)+(z.secsInZone||0);
        else acc[k]={...z};
      });
      prev.hrTimeInZone=Object.values(acc);
    }
  }
  return out;
}

/* ── CONVERT RAW GARMIN JSON → RENDERER FORMAT ── */
function fromRawGarmin(raw){
  if(raw.actividades_raw){
    return{actividades:raw.actividades_raw.map(fromRawGarmin).filter(Boolean)};
  }

  const rawLaps=raw.laps||raw.splits||[];
  if(!rawLaps.length&&!raw.activity_id&&!raw.activityId)return null;

  const name=raw.activity_name||raw.activityName||raw.name||'';
  const startLocal=raw.start_time_local||raw.startTimeLocal||raw.date||'';
  const MESES=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const fparts=(startLocal+'').split(/[-T ]/);
  const fechaFmt=fparts.length>=3?(parseInt(fparts[2])+' '+MESES[parseInt(fparts[1])]):'';

  const tipo=({
    treadmill_running:'CINTA',running:'ASFALTO',cycling:'BICI',swimming:'NATACIÓN',
    road_running:'ASFALTO',trail_running:'TRAIL',indoor_cycling:'BICI'
  })[raw.activity_type||raw.type||'']||'CINTA';

  const sum=raw.summary||{};
  const sumDist=sum.distance||sum.total_distance||sum.totalDistance||sum.distance_m||0;

  // Global HR zones — handle both array and {z1_s,...} object formats
  let _rz=raw.hr_time_in_zones||raw.hrTimeInZones||raw.hr_zones||raw.hrZones||[];
  if(_rz&&!Array.isArray(_rz)){
    const _o=_rz;
    _rz=[1,2,3,4,5].map(n=>({zoneNumber:n,secsInZone:_o['z'+n+'_s']||_o['z'+n]||0,zoneLowBoundary:0})).filter(z=>z.secsInZone>0);
  }
  const rawZones=_rz;
  const globalZones=rawZones.map(z=>({
    zoneNumber:z.zoneNumber||z.zone||0,
    secsInZone:z.secsInZone||z.secs||z.seconds||0,
    zoneLowBoundary:z.zoneLowBoundary||z.lowBoundary||0
  })).filter(z=>z.zoneNumber>0&&z.secsInZone>0);

  const ZONE_NAMES={1:'Zona 1 · Calentamiento',2:'Zona 2 · Suave',3:'Zona 3 · Aeróbica',4:'Zona 4 · Umbral',5:'Zona 5 · Máximo'};
  const ZONE_COLORS={1:'#a0a0a0',2:'#4a90e2',3:'#27ae60',4:'#f39c12',5:'#e74c3c'};

  // Build sorted-by-zoneNumber lookup for boundaries
  const allZones=rawZones.map(z=>({
    zoneNumber:z.zoneNumber||z.zone||0,
    zoneLowBoundary:z.zoneLowBoundary||z.lowBoundary||0
  })).filter(z=>z.zoneNumber>0);

  function zoneRange(num){
    const me=allZones.find(g=>g.zoneNumber===num);
    if(!me||!me.zoneLowBoundary)return '';
    const upper=allZones.find(g=>g.zoneNumber===num+1);
    return upper&&upper.zoneLowBoundary?`${me.zoneLowBoundary}–${upper.zoneLowBoundary} ppm`:`> ${me.zoneLowBoundary} ppm`;
  }

  function buildZones(zonesArr){
    return zonesArr.filter(z=>z.secsInZone>0)
      .sort((a,b)=>b.zoneNumber-a.zoneNumber)
      .map(z=>({
        nombre:ZONE_NAMES[z.zoneNumber]||`Z${z.zoneNumber}`,
        secs:z.secsInZone,
        rango:zoneRange(z.zoneNumber),
        color:ZONE_COLORS[z.zoneNumber]||'#888'
      }));
  }

  // Zone distribution per lap (weighted by FC)
  const allHRs=rawLaps.map(l=>_normLap(l).averageHR).filter(v=>v>0);
  const hrMin=allHRs.length?Math.min(...allHRs):100;
  const hrMax=allHRs.length?Math.max(...allHRs):200;
  const hrRange=hrMax-hrMin||1;
  function lapZones(normLap){
    if(!globalZones.length)return[];
    const dur=normLap.duration;
    if(!dur)return[];
    const fcFactor=normLap.averageHR>0?Math.max(0,Math.min(1,(normLap.averageHR-hrMin)/hrRange)):0.5;
    const tot=globalZones.reduce((a,z)=>a+z.secsInZone,0);
    if(!tot)return[];
    const result=globalZones.map(z=>{
      const num=z.zoneNumber;
      let w=1;
      if(num>=4)w=0.5+fcFactor;
      else if(num<=2)w=1.5-fcFactor;
      return{zoneNumber:num,pct:z.secsInZone/tot,w};
    });
    const wSum=result.reduce((a,z)=>a+z.pct*z.w,0);
    return result.map(z=>{
      const secs=Math.round((z.pct*z.w/wSum)*dur);
      return{nombre:ZONE_NAMES[z.zoneNumber]||`Z${z.zoneNumber}`,
        secs,rango:zoneRange(z.zoneNumber),color:ZONE_COLORS[z.zoneNumber]||'#888'};
    }).filter(z=>z.secs>0);
  }

  // Splits-based format (running with km splits — explicit splits array)
  const isSplitsBased=!raw.laps&&raw.splits;
  if(isSplitsBased){
    const series=raw.splits.map((s,i)=>{
      const paceMin=s.time||s.pace||s.avg_pace||0;
      const speed=paceMin>0?1000/(paceMin*60):0;
      const dist_km=s.dist_km||s.distance||(s.km?1:0)||1;
      const dur_secs=paceMin?Math.round(paceMin*60*dist_km):0;
      const synthLap={averageHR:s.avg_hr||s.fc_med||0,duration:dur_secs};
      return{
        label:`Km ${s.km||i+1}`,_intensityType:'INTERVAL',
        speed,dist_km,dur_secs,
        cadencia:Math.round(s.cadencia||s.avg_cadence||0),
        desnivel:s.desnivel||0,
        fc_med:Math.round(s.avg_hr||s.fc_med||0),
        fc_max:Math.round(s.max_hr||s.fc_max||0),
        zonas_lap:lapZones(synthLap)
      };
    });
    return{fecha:fechaFmt,nombre:name,tipo,modo:'carrera',estructura:null,
      distancia_total:(sumDist/1000).toFixed(2)+' km',
      warmup:null,series,cooldown:null,zonas:buildZones(globalZones)};
  }

  // Normalize all laps, remove pure artefact laps (0m AND <15s: timer/sensor init)
  let laps=rawLaps.map(_normLap).filter(l=>!(l.distance===0&&l.duration<15));

  // Merge laps split by auto-lap (same wktStepIndex + same intensityType, consecutive)
  laps=_mergeAutoLapSplits(laps);

  // Filter trailing tiny noise laps (<5s AND <50m)
  while(laps.length>0){
    const last=laps[laps.length-1];
    if(last.duration<5&&last.distance<50)laps.pop();
    else break;
  }
  if(!laps.length){
    return{fecha:fechaFmt,nombre:name,tipo,modo:'carrera',estructura:null,
      distancia_total:(sumDist/1000).toFixed(2)+' km',
      warmup:null,series:[],cooldown:null,zonas:buildZones(globalZones)};
  }

  // Detect free-run mode: all/most laps are INTERVAL type, or ~1km each (continuous run)
  // OR: all laps are similar distance (~900-1100m) = continuous run
  const intervalLapsCount=laps.filter(l=>l.intensityType==='INTERVAL').length;
  const similarDistances=laps.filter(l=>l.distance>=900&&l.distance<=1100).length;
  const isContinuousRun=(similarDistances>=laps.length-1&&laps.length>=3)||(intervalLapsCount>=laps.length-1&&intervalLapsCount>=3);

  if(isContinuousRun){
    // Continuous run: each lap is just number (no "Km" prefix)
    const series=laps.map((l,i)=>{
      // Accept multiple cadence field names (from .fit or converted)
      var cad=l.avgRunningCadence||l.averageRunCadence||l.avg_running_cadence||l.avg_cadence||l.avg_run_cadence||l.averageCadence||l.cadencia||l.cadence||0;
      return{
        label:`${i+1}`,
        _intensityType:'INTERVAL',
        speed:l.averageSpeed,
        dist_km:Math.round(l.distance/10)/100,
        dur_secs:Math.round(l.duration),
        cadencia:Math.round(cad),
        desnivel:Math.round(l.elevationGain-l.elevationLoss),
        fc_med:Math.round(l.averageHR||0),
        fc_max:Math.round(l.maxHR||0),
        zonas_lap:lapZones(l)
      };
    });
    return{fecha:fechaFmt,nombre:name,tipo,modo:'carrera',estructura:null,
      distancia_total:(sumDist/1000).toFixed(2)+' km',
      warmup:null,series,cooldown:null,zonas:buildZones(globalZones)};
  }

  // Interval mode: classify RECOVERY laps as descansos (between intervals) or cooldown (at end)
  // Find the last non-RECOVERY lap index. RECOVERY laps after it = cooldown. Before = descanso.
  let lastRealIdx=-1;
  for(let i=laps.length-1;i>=0;i--){
    if(laps[i].intensityType!=='RECOVERY'){lastRealIdx=i;break;}
  }
  // lastRealIdx is the last ACTIVE/REST/WARMUP/INTERVAL lap. Anything after is cooldown.
  const cooldownLaps=laps.slice(lastRealIdx+1);
  const mainLaps=laps.slice(0,lastRealIdx+1);

  let warmup=null,cooldown=null;
  const series=[];
  let activeCount=0,restCount=0;

  // Build cooldown (merge if multiple)
  if(cooldownLaps.length){
    const totDist=cooldownLaps.reduce((a,l)=>a+l.distance,0);
    const totDur=cooldownLaps.reduce((a,l)=>a+l.duration,0);
    const wHR=cooldownLaps.reduce((a,l)=>a+(l.averageHR*l.duration),0)/(totDur||1);
    const maxHR=Math.max(...cooldownLaps.map(l=>l.maxHR||0));
    const wCad=cooldownLaps.reduce((a,l)=>a+(l.averageRunCadence*l.duration),0)/(totDur||1);
    const wSpd=totDur>0?totDist/totDur:0;
    const synthLap={averageHR:wHR,duration:totDur};
    cooldown={
      label:'Recuperación',_intensityType:'RECOVERY',
      speed:wSpd,
      dist_km:Math.round(totDist/10)/100,
      dur_secs:Math.round(totDur),
      cadencia:Math.round(wCad),
      desnivel:0,
      fc_med:Math.round(wHR),
      fc_max:Math.round(maxHR),
      zonas_lap:lapZones(synthLap)
    };
  }

  mainLaps.forEach((lap,i)=>{
    const intensity=lap.intensityType;
    const dist_km=Math.round(lap.distance/10)/100;
    const dur_secs=Math.round(lap.duration);
    // Accept multiple cadence field names
    var cad=lap.avgRunningCadence||lap.averageRunCadence||lap.avg_running_cadence||lap.avg_cadence||lap.avg_run_cadence||lap.averageCadence||lap.cadencia||lap.cadence||0;
    const s={
      label:'',_intensityType:intensity,
      speed:lap.averageSpeed,
      dist_km,dur_secs,
      cadencia:Math.round(cad),
      desnivel:Math.round(lap.elevationGain-lap.elevationLoss),
      fc_med:Math.round(lap.averageHR||0),
      fc_max:Math.round(lap.maxHR||0),
      zonas_lap:lapZones(lap)
    };
    if(intensity==='WARMUP'&&!warmup){s.label='Calentamiento';warmup=s;return;}
    if(intensity==='REST'){
      restCount++;s.label=`Descanso ${restCount}`;s._intensityType='REST';series.push(s);
    } else if(intensity==='RECOVERY'){
      // Will be handled as cooldown at end
      restCount++;s.label=`Descanso ${restCount}`;s._intensityType='REST';series.push(s);
    } else {
      // ACTIVE or INTERVAL or anything else
      activeCount++;s.label=`Serie ${activeCount}`;series.push(s);
    }
  });

  const sumDist2=sumDist||laps.reduce((a,l)=>a+l.distance,0)||0;
  var modo='carrera';
  if(restCount>0||warmup||cooldown){
    modo='intervalos';
  } else if(activeCount<=5){
    modo='intervalos';
  }

  return{fecha:fechaFmt,nombre:name,tipo,modo,estructura:null,
    distancia_total:(sumDist2/1000).toFixed(2)+' km',
    warmup,series,cooldown,zonas:buildZones(globalZones)};
}

/* ── RENDER ── */
function render(){
  const raw=document.getElementById('json-input').value.trim();
  const errEl=document.getElementById('error-msg');
  errEl.style.display='none';
  if(!raw){errEl.textContent='Carga un archivo primero.';errEl.style.display='block';return;}
  const parsed=extractJson(raw);
  if(!parsed){
    errEl.textContent='No se encontró un JSON válido. Asegúrate de copiar el bloque completo { ... }.';
    errEl.style.display='block';return;
  }

  // Auto-detect format
  let lista;
  function isRawActivity(p){
    return p&&(p.activity_id||p.activityId||p.activity_name||p.activityName)&&
           (p.laps||p.splits||p.hr_zones||p.hr_time_in_zones||p.summary);
  }
  if(parsed.actividades_raw){
    const converted=fromRawGarmin(parsed);
    lista=converted.actividades;
  } else if(isRawActivity(parsed)){
    lista=[fromRawGarmin(parsed)].filter(Boolean);
  } else if(parsed.series&&Array.isArray(parsed.series)&&parsed.series[0]?.laps){
    lista=[fromChatGPTNested(parsed)].filter(Boolean);
  } else if(parsed.actividades){
    lista=parsed.actividades;
  } else {
    lista=[parsed];
  }

  document.getElementById('output').innerHTML=`<div id="render-target">${lista.map(renderActividad).join('')}</div>`;
  document.getElementById('btn-img').style.display='inline-flex';
  document.getElementById('btn-copy-img').style.display='inline-flex';
  document.getElementById('filter-bar').classList.add('visible');
  // En móvil, scroll al output
  if(window.innerWidth<900){
    setTimeout(()=>document.getElementById('output').scrollIntoView({behavior:'smooth',block:'start'}),100);
  }
}

/* ── SAVE IMAGE ── */
function isIOS(){
  return/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
}
function openIOSave(canvas){
  let dataUrl='';
  try{dataUrl=canvas.toDataURL('image/png');}catch(e){
    alert('Imagen demasiado grande. Usa "Generar imagen" con menos actividades.');
    return;
  }
  const win=window.open('','_blank');
  if(win){
    win.document.write(`<html><head>
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <style>body{margin:0;background:#0b0c0f;display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;font-family:-apple-system,sans-serif;color:#9aa0a6}
      p{font-size:14px;text-align:center;line-height:1.6}strong{color:#eaeaea;display:block;margin-top:4px;font-size:16px}
      img{max-width:100%;border-radius:8px}</style></head><body>
      <p>Mantén pulsada la imagen<strong>→ Guardar en Fotos</strong><span style="font-size:12px;color:#555">o compártela directamente</span></p>
      <img src="${dataUrl}"></body></html>`);
    win.document.close();
  } else {
    alert('Permite las ventanas emergentes en Safari.');
  }
}
function saveImg(){
  const btn=document.getElementById('btn-img');
  btn.textContent='Generando...';btn.disabled=true;
  _captureEl(canvas=>{
    if(isIOS()){
      let dataUrl='';
      try{dataUrl=canvas.toDataURL('image/png');}catch(e){
        alert('La imagen es demasiado grande para Safari. Prueba con menos actividades a la vez.');
        btn.textContent='Generar imagen';btn.disabled=false;return;
      }
      const win=window.open('','_blank');
      if(win){
        win.document.write(`<html><head>
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <style>body{margin:0;background:#0b0c0f;display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;font-family:-apple-system,sans-serif;color:#9aa0a6}
          p{font-size:13px;text-align:center;line-height:1.5}strong{color:#eaeaea}
          img{max-width:100%;border-radius:8px;box-shadow:0 2px 20px rgba(0,0,0,.5)}</style>
          </head><body>
          <p>Mantén pulsada la imagen →<br><strong>Añadir a Fotos</strong></p>
          <img src="${dataUrl}">
          </body></html>`);
        win.document.close();
      } else {
        alert('Permite las ventanas emergentes en Safari para guardar la imagen.');
      }
    } else {
      const link=document.createElement('a');
      const lbls=document.querySelectorAll('#render-target .lbl');
      link.download=(lbls.length===1?lbls[0].textContent.replace(/[^a-z0-9]/gi,'_').toLowerCase():'entrenos_'+lbls.length)+'.png';
      link.href=canvas.toDataURL('image/png');
      link.click();
    }
    btn.textContent='Generar imagen';btn.disabled=false;
  });
}

/* ── SHARED CAPTURE (4K on desktop, safe on iOS) ── */
function _captureEl(callback){
  const el=document.getElementById('render-target');
  if(!el)return;
  const clone=el.cloneNode(true);
  clone.querySelectorAll('.hide-btn,.group-arrow-btn').forEach(b=>b.style.display='none');
  clone.querySelectorAll('.row-hidden').forEach(r=>r.style.display='none');
  clone.querySelectorAll('.lbl').forEach(l=>{l.removeAttribute('contenteditable');l.style.borderBottom='none';l.style.cursor='default';});
  clone.querySelectorAll('.hide-btn').forEach(b=>b.remove());

  const wrapper=document.createElement('div');
  wrapper.style.cssText='position:fixed;top:-99999px;left:0;background:#0b0c0f;padding:32px;'
    +'width:auto;min-width:1400px;max-width:none;box-sizing:border-box;z-index:-9999;overflow:visible;';
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  // iOS Safari has a max canvas size of ~16MP — use lower scale
  const scale=isIOS()?1.5:4;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const w=Math.max(wrapper.scrollWidth,clone.scrollWidth)+64;
    const h=wrapper.scrollHeight+64;
    html2canvas(wrapper,{
      backgroundColor:'#0b0c0f',
      scale:scale,
      useCORS:true,
      logging:false,
      width:w,height:h,
      windowWidth:w,windowHeight:h,
      scrollX:0,scrollY:0,
      allowTaint:false,imageTimeout:0
    }).then(canvas=>{
      document.body.removeChild(wrapper);
      callback(canvas);
    }).catch(e=>{
      document.body.removeChild(wrapper);
      alert('Error al capturar: '+e.message);
    });
  }));
}


/* ── COPY IMAGE TO CLIPBOARD (4K) ── */
function copyImg(){
  const btn=document.getElementById('btn-copy-img');
  btn.textContent='Generando...';btn.disabled=true;

  const el=document.getElementById('render-target');
  if(!el){btn.textContent='Copiar imagen';btn.disabled=false;return;}

  const clone=el.cloneNode(true);
  clone.querySelectorAll('.hide-btn').forEach(b=>b.remove());
  clone.querySelectorAll('.row-hidden').forEach(r=>r.style.display='none');
  clone.querySelectorAll('.lbl').forEach(l=>{l.removeAttribute('contenteditable');l.style.borderBottom='none';l.style.cursor='default';});

  const wrapper=document.createElement('div');
  wrapper.style.cssText='position:fixed;top:-99999px;left:0;background:#0b0c0f;padding:32px;'
    +'width:auto;min-width:1400px;max-width:none;box-sizing:border-box;z-index:-9999;overflow:visible;';
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  const scale=isIOS()?1.5:3;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const w=Math.max(wrapper.scrollWidth,clone.scrollWidth)+64;
    const h=wrapper.scrollHeight+64;
    html2canvas(wrapper,{
      backgroundColor:'#0b0c0f',scale,useCORS:true,logging:false,
      width:w,height:h,windowWidth:w,windowHeight:h,
      scrollX:0,scrollY:0,allowTaint:false,imageTimeout:0
    }).then(canvas=>{
      document.body.removeChild(wrapper);

      // Intentar copiar al portapapeles (funciona en PC/Mac)
      canvas.toBlob(blob=>{
        if(!blob){openIOSave(canvas);return;}
        navigator.clipboard.write([new ClipboardItem({'image/png':blob})])
          .then(()=>{
            btn.textContent='✓ Copiada';
            setTimeout(()=>{btn.textContent='Copiar imagen';btn.disabled=false;},2500);
          })
          .catch(e=>{openIOSave(canvas);});
      },'image/png');
    }).catch(e=>{
      document.body.removeChild(wrapper);
      alert('Error: '+e.message);
      btn.textContent='Copiar imagen';btn.disabled=false;
    });
  }));
}

/* ── LOAD .FIT or .ZIP FILE ── */
function loadFitOrZip(input) {
  var file = input.files[0];
  if (!file) return;
  var name = file.name.toLowerCase();
  if (name.endsWith('.zip')) {
    loadZip(file);
  } else {
    loadFit(input);
  }
}

function loadZip(file) {
  var errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  if (typeof JSZip === 'undefined') {
    errEl.textContent = 'JSZip no cargada.'; errEl.style.display = 'block'; return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    JSZip.loadAsync(e.target.result).then(function(zip) {
      // Find the first .fit file inside
      var fitEntry = null;
      zip.forEach(function(relPath, entry) {
        if (!fitEntry && relPath.toLowerCase().endsWith('.fit')) fitEntry = entry;
      });
      if (!fitEntry) {
        errEl.textContent = 'No se encontró un archivo .fit dentro del .zip.';
        errEl.style.display = 'block'; return;
      }
      fitEntry.async('arraybuffer').then(function(buf) {
        if (typeof FitParser === 'undefined') {
          errEl.textContent = 'Librería FIT no cargada aún.'; errEl.style.display = 'block'; return;
        }
        try {
          var parser = new FitParser({ force: true, speedUnit: 'm/s', lengthUnit: 'm', temperatureUnit: 'celsius', elapsedRecordField: true, mode: 'list' });
          parser.parse(buf, function(error, fitData) {
            if (error) { errEl.textContent = 'Error .fit: ' + error; errEl.style.display = 'block'; return; }
            try {
              var json = fitToGarminJson(fitData, fitEntry.name);
              document.getElementById('json-input').value = JSON.stringify(json, null, 2);
              render();
            } catch(ex) { errEl.textContent = 'Error al convertir: ' + ex.message; errEl.style.display = 'block'; }
          });
        } catch(ex) { errEl.textContent = 'Error: ' + ex.message; errEl.style.display = 'block'; }
      });
    }).catch(function(ex) {
      errEl.textContent = 'Error al leer el .zip: ' + ex.message; errEl.style.display = 'block';
    });
  };
  reader.readAsArrayBuffer(file);
}

/* ── LOAD .FIT FILE ── */
function loadFit(input) {
  var file = input.files[0];
  input.value = '';
  if (!file) return;
  var errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if (typeof FitParser === 'undefined') {
    errEl.textContent = 'Librería FIT no cargada aún. Espera un momento y vuelve a intentarlo.';
    errEl.style.display = 'block'; return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var parser = new FitParser({
        force: true,
        speedUnit: 'm/s',
        lengthUnit: 'm',
        temperatureUnit: 'celsius',
        elapsedRecordField: true,
        mode: 'list'
      });
      parser.parse(e.target.result, function(error, fitData) {
        if (error) {
          errEl.textContent = 'Error al leer el .fit: ' + error;
          errEl.style.display = 'block'; return;
        }
        try {
          var json = fitToGarminJson(fitData, file.name);
          document.getElementById('json-input').value = JSON.stringify(json, null, 2);
          render();
        } catch(ex) {
          errEl.textContent = 'Error al convertir: ' + ex.message;
          errEl.style.display = 'block';
        }
      });
    } catch(ex) {
      errEl.textContent = 'Error: ' + ex.message;
      errEl.style.display = 'block';
    }
  };
  reader.readAsArrayBuffer(file);
}

function _fitVal(obj) {
  // fit-file-parser returns camelCase; also accept snake_case fallbacks
  function g(a, b) { return obj[a] !== undefined ? obj[a] : (obj[b] !== undefined ? obj[b] : 0); }
  return g;
}

function fitToGarminJson(fitData, filename) {
  var sessions = fitData.sessions || [];
  var laps     = fitData.laps     || [];
  var records  = fitData.records  || [];
  var workouts = fitData.workouts || [];
  var zonesArr = fitData.zonesTarget || fitData.zones_target || [];

  var session  = sessions[0]  || {};
  var zt       = zonesArr[0]  || {};
  var workout  = workouts[0]  || {};

  /* ── Activity name: prefer workout name → session sub_sport → filename ── */
  var wktName = workout.wktName || workout.wkt_name || '';
  var subSport = (session.subSport || session.sub_sport || '').toLowerCase();
  var sport    = (session.sport    || '').toLowerCase();
  var activityName = wktName || (filename ? filename.replace(/\.fit$/i,'').replace(/_/g,' ') : 'Actividad .fit');

  /* ── Start time → "DD Mes" ── */
  var MESES = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var startRaw = session.localTimestamp || session.local_timestamp || session.startTime || session.start_time || '';
  var fechaFmt = '';
  if (startRaw) {
    var d = (startRaw instanceof Date) ? startRaw : new Date(String(startRaw).replace(' ','T'));
    if (!isNaN(d.getTime())) {
      fechaFmt = d.getDate() + ' ' + MESES[d.getMonth()+1];
    }
  }

  /* ── Activity type ── */
  var activityType = subSport === 'treadmill' ? 'treadmill_running'
                   : subSport === 'trail'     ? 'trail_running'
                   : sport    === 'running'   ? 'running'
                   : 'running';

  /* ── HR zone boundaries from zonesTarget (50/60/70/80/90% maxHR) ── */
  var maxHR = zt.maxHeartRate || zt.max_heart_rate || session.maxHeartRate || session.max_heart_rate || 190;
  var bounds = [0.50, 0.60, 0.70, 0.80, 0.90].map(function(p){ return Math.round(maxHR * p); });

  /* ── Compute HR zones from per-second records ── */
  var zoneSecs = [0,0,0,0,0];
  records.forEach(function(r) {
    var hr = r.heartRate || r.heart_rate || 0;
    if (!hr) return;
    var z = 0;
    for (var i = 4; i >= 0; i--) { if (hr >= bounds[i]) { z = i; break; } }
    zoneSecs[z]++;
  });

  var hr_time_in_zones = zoneSecs.map(function(secs, i) {
    return { zoneNumber: i+1, secsInZone: secs, zoneLowBoundary: bounds[i] };
  });

  /* ── Convert laps to raw Garmin API format ── */
  var intensityMap = { warmup: 'WARMUP', active: 'ACTIVE', rest: 'REST', recovery: 'RECOVERY', cooldown: 'RECOVERY' };
  var rawLaps = laps.map(function(lap, i) {
    var intensity = (lap.intensity || lap.intensityType || 'active').toString().toLowerCase();

    /* FIT stores half-cadence (one foot). Multiply by 2 for total spm. */
    var cadHalf = lap.avg_cadence || lap.avgRunningCadence || lap.avg_running_cadence || 0;
    var cadFrac = lap.avg_fractional_cadence || lap.avgFractionalCadence || 0;
    var fullCad = cadHalf * 2 + cadFrac * 2;

    var dist = lap.total_distance || lap.totalDistance || 0;
    var dur  = lap.total_elapsed_time || lap.totalElapsedTime || lap.total_timer_time || lap.totalTimerTime || 0;
    var spd  = lap.enhanced_avg_speed || lap.enhancedAvgSpeed || lap.avg_speed || lap.avgSpeed || (dist > 0 && dur > 0 ? dist/dur : 0);
    var wktIdx = lap.wktStepIndex !== undefined ? lap.wktStepIndex : (lap.wkt_step_index !== undefined ? lap.wkt_step_index : null);

    return {
      distance: dist,
      duration: dur,
      movingDuration: lap.totalMovingTime || lap.total_moving_time || 0,
      averageSpeed: spd,
      averageMovingSpeed: spd,
      averageHR: lap.avg_heart_rate || lap.avgHeartRate || 0,
      maxHR: lap.max_heart_rate || lap.maxHeartRate || 0,
      averageRunCadence: fullCad,
      elevationGain: lap.totalAscent  || lap.total_ascent  || 0,
      elevationLoss: lap.totalDescent || lap.total_descent || 0,
      intensityType: intensityMap[intensity] || 'ACTIVE',
      wktStepIndex: wktIdx,
      hrTimeInZone: []
    };
  });

  var totalDist = session.total_distance || session.totalDistance || rawLaps.reduce(function(a,l){return a+l.distance;},0);

  /* ── Build start_time_local in ISO format that fromRawGarmin can parse ── */
  var startISO = '';
  if (startRaw) {
    var d2 = (startRaw instanceof Date) ? startRaw : new Date(String(startRaw).replace(' ','T'));
    if (!isNaN(d2.getTime())) {
      var mm = d2.getMonth()+1, dd = d2.getDate();
      startISO = d2.getFullYear()+'-'+(mm<10?'0':'')+mm+'-'+(dd<10?'0':'')+dd+'T'+(d2.getHours()<10?'0':'')+d2.getHours()+':00:00';
    }
  }

  return {
    activity_id: 'fit_' + Date.now(),
    activity_name: activityName,
    activity_type: activityType,
    start_time_local: startISO,
    summary: {
      distance: totalDist,
      duration: session.totalElapsedTime || session.total_elapsed_time || 0,
      averageHR: session.avg_heart_rate || session.avgHeartRate || 0,
      maxHR: session.max_heart_rate || session.maxHeartRate || 0,
      averageSpeed: session.enhanced_avg_speed || session.enhancedAvgSpeed || session.avg_speed || 0,
      calories: session.total_calories || session.totalCalories || 0
    },
    laps: rawLaps,
    hr_time_in_zones: hr_time_in_zones
  };
}

function togglePrompt(){
  var b=document.getElementById('prompt-body'),a=document.getElementById('toggle-arrow');
  if(!b)return;
  var open=b.style.display==='none'||b.style.display==='';
  b.style.display=open?'block':'none';
  a.textContent=open?'▼':'▶';
  a.classList.toggle('open',open);
}

function copyPrompt(){
  var text=document.getElementById('prompt-box').innerText;
  var btn=document.querySelector('.btn-copy');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      btn.textContent='✓ Copiado';
      setTimeout(function(){btn.textContent='Copiar';},2000);
    }).catch(function(){
      btn.textContent='Error';
      setTimeout(function(){btn.textContent='Copiar';},2000);
    });
  } else {
    btn.textContent='No disponible';
  }
}
